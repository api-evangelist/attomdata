"""
ATTOM Data GraphQL Schema
Conceptual schema covering ATTOM Property, Assessment, Sales, Mortgage, Foreclosure,
Owner, School, Community, Demographics, POI, Permit, and Area Intelligence APIs.
"""

# ─── Root Types ────────────────────────────────────────────────────────────────

type Query {
  """Look up a property by AttomID, address, or APN."""
  property(attomId: ID, address1: String, address2: String, apn: String, fips: String): Property

  """Search properties within a radius or bounding box."""
  propertySearch(
    latitude: Float
    longitude: Float
    radius: Float
    minLat: Float
    minLon: Float
    maxLat: Float
    maxLon: Float
    pageSize: Int
    page: Int
  ): PropertySearchResult

  """Retrieve assessment details for a property."""
  assessment(attomId: ID, address1: String, address2: String): Assessment

  """Retrieve assessment history for a property."""
  assessmentHistory(attomId: ID, address1: String, address2: String, startYear: Int, endYear: Int): [Assessment]

  """Retrieve the most recent sale for a property."""
  sale(attomId: ID, address1: String, address2: String): Sale

  """Retrieve sale history for a property."""
  salesHistory(attomId: ID, address1: String, address2: String): [Sale]

  """Find comparable sales near a property."""
  salesComparables(attomId: ID, address1: String, address2: String, miles: Float, pageSize: Int): [Sale]

  """Current AVM (Automated Valuation Model) estimate."""
  avm(attomId: ID, address1: String, address2: String): HVA

  """AVM history for a property."""
  avmHistory(attomId: ID, address1: String, address2: String): [HVA]

  """Rental AVM estimate."""
  rentalAvm(attomId: ID, address1: String, address2: String): HVA

  """Home equity estimate."""
  homeEquity(attomId: ID, address1: String, address2: String): HVA

  """Pre-foreclosure / foreclosure status."""
  foreclosure(attomId: ID, address1: String, address2: String): Foreclosure

  """Building permits on a property."""
  buildingPermits(attomId: ID, address1: String, address2: String): [Permit]

  """All events (sales, assessment, foreclosure, permit) for a property."""
  allEvents(attomId: ID, address1: String, address2: String): AllEvents

  """School assignment for a property address."""
  schools(address1: String, address2: String): [School]

  """Transportation noise index for a property."""
  transportationNoise(attomId: ID, address1: String, address2: String): HazardDetails

  """Points of Interest near a location."""
  poi(latitude: Float!, longitude: Float!, radius: Float, category: String, page: Int, pageSize: Int): [POI]

  """Community / neighborhood profile by geoIdV4."""
  community(geoIdV4: String!): Community

  """Area boundary (GeoJSON polygon) by geoId."""
  areaBoundary(geoId: String!, geoIdType: String): AreaBoundary

  """Geographic hierarchy for a lat/lon."""
  areaHierarchy(latitude: Float!, longitude: Float!): AreaHierarchy

  """List available counties for a state."""
  counties(state: String!): [AreaUnit]

  """Resolve a geoIdV4 to its location metadata."""
  locationLookup(geoIdV4: String!, geoType: String): AreaUnit
}

# ─── Property ──────────────────────────────────────────────────────────────────

type PropertySearchResult {
  total: Int
  page: Int
  pageSize: Int
  properties: [Property]
}

type Property {
  """Unique ATTOM identifier."""
  attomId: ID!
  identifier: PropertyIdentifiers
  address: PropertyAddress
  summary: PropertyDetails
  building: Building
  lot: Lot
  assessment: Assessment
  sale: Sale
  owner: Owner
  mortgage: MortgageDetails
  foreclosure: Foreclosure
  permits: [Permit]
  schools: [School]
  avm: HVA
  rentalAvm: HVA
  homeEquity: HVA
  community: Community
  hazards: HazardDetails
}

type PropertyDetails {
  propertyType: PropertyType
  yearBuilt: Int
  bedrooms: Int
  bathrooms: Float
  grossArea: Float
  livingArea: Float
  stories: Int
  units: Int
  garage: String
  pool: Boolean
  fireplace: Boolean
  basement: String
  roofType: String
  constructionType: String
  condition: String
  quality: String
}

enum PropertyType {
  SINGLE_FAMILY
  CONDO
  TOWNHOUSE
  MULTI_FAMILY
  MOBILE_HOME
  COMMERCIAL
  AGRICULTURAL
  VACANT_LAND
  OTHER
}

type PropertyAddress {
  line1: String
  line2: String
  city: String
  state: String
  zip: String
  zip4: String
  county: String
  country: String
  latitude: Float
  longitude: Float
  formattedAddress: String
}

type PropertyIdentifiers {
  attomId: ID
  apn: APN
  fips: FIPS
  parcelId: String
  geoIdV4: String
  censusBlock: String
  censusTract: String
  taxId: String
}

type APN {
  apn: String
  apnOrig: String
  apnFormatted: String
}

type FIPS {
  stFips: String
  cntyFips: String
  fips: String
}

