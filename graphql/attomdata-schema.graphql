# ─── Auth / API Key ────────────────────────────────────────────────────────────

"""
ATTOM API uses an API key passed as the `apikey` HTTP header.
All queries require a valid APIKey.
"""
type APIKey {
  key: String!
  created: String
  expires: String
  scopes: [String]
  rateLimit: Int
  remainingCalls: Int
}

type Token {
  accessToken: String
  tokenType: String
  expiresIn: Int
  scope: String
}
