naftiko: 1.0.0-alpha2
info:
  label: ATTOM Property API — Assessment
  description: 'ATTOM Assessment — assessed value, tax liability, and assessment history. Self-contained
    Naftiko capability covering one ATTOM business surface.'
  tags:
  - ATTOM
  - Assessment
  - Tax
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ATTOM_API_KEY: ATTOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: property-assessment
    baseUri: https://api.gateway.attomdata.com
    description: ATTOM Property — Assessment business capability.
    resources:
    - name: assessment-detail
      path: /propertyapi/v1.0.0/assessment/detail
      operations:
      - name: getassessmentdetail
        method: GET
        description: ATTOM Get Assessment Detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: AttomID
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
    - name: assessment-snapshot
      path: /propertyapi/v1.0.0/assessment/snapshot
      operations:
      - name: getassessmentsnapshot
        method: GET
        description: ATTOM Get Assessment Snapshot
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: AttomID
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
    - name: assessment-history
      path: /propertyapi/v1.0.0/assessmenthistory/detail
      operations:
      - name: getassessmenthistory
        method: GET
        description: ATTOM Get Assessment History Detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: AttomID
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
    authentication:
      type: apikey
      key: apikey
      value: '{{env.ATTOM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: property-assessment-rest
    port: 8080
    description: REST adapter for ATTOM Property — Assessment.
    resources:
    - path: /v1/assessment/detail
      name: assessment-detail
      operations:
      - method: GET
        name: getassessmentdetail
        description: ATTOM Get Assessment Detail
        call: property-assessment.getassessmentdetail
        with:
          AttomID: rest.query.AttomID
          address: rest.query.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assessment/snapshot
      name: assessment-snapshot
      operations:
      - method: GET
        name: getassessmentsnapshot
        description: ATTOM Get Assessment Snapshot
        call: property-assessment.getassessmentsnapshot
        with:
          AttomID: rest.query.AttomID
          address: rest.query.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/assessmenthistory/detail
      name: assessment-history
      operations:
      - method: GET
        name: getassessmenthistory
        description: ATTOM Get Assessment History Detail
        call: property-assessment.getassessmenthistory
        with:
          AttomID: rest.query.AttomID
          address: rest.query.address
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: property-assessment-mcp
    port: 9090
    transport: http
    description: MCP adapter for ATTOM Property — Assessment.
    tools:
    - name: attom-get-assessment-detail
      description: ATTOM Get Assessment Detail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-assessment.getassessmentdetail
      with:
        AttomID: tools.AttomID
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
    - name: attom-get-assessment-snapshot
      description: ATTOM Get Assessment Snapshot
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-assessment.getassessmentsnapshot
      with:
        AttomID: tools.AttomID
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
    - name: attom-get-assessment-history
      description: ATTOM Get Assessment History Detail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-assessment.getassessmenthistory
      with:
        AttomID: tools.AttomID
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
