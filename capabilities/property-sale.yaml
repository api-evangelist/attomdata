naftiko: 1.0.0-alpha2
info:
  label: ATTOM Property API — Sale
  description: 'ATTOM Sale — sales transactions, sales history, and comparable sales. Self-contained Naftiko
    capability covering one ATTOM business surface.'
  tags:
  - ATTOM
  - Sale
  - Transactions
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ATTOM_API_KEY: ATTOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: property-sale
    baseUri: https://api.gateway.attomdata.com
    description: ATTOM Property — Sale business capability.
    resources:
    - name: sale-detail
      path: /propertyapi/v1.0.0/sale/detail
      operations:
      - name: getsaledetail
        method: GET
        description: ATTOM Get Sale Detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: AttomID
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
    - name: saleshistory-detail
      path: /propertyapi/v1.0.0/saleshistory/detail
      operations:
      - name: getsaleshistorydetail
        method: GET
        description: ATTOM Get Sales History Detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: AttomID
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
    - name: sales-trend
      path: /propertyapi/v1.0.0/transaction/salestrend
      operations:
      - name: getsalestrend
        method: GET
        description: ATTOM Get Sales Trend
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: geoIdV4
          in: query
          type: string
          required: true
        - name: interval
          in: query
          type: string
          required: false
    authentication:
      type: apikey
      key: apikey
      value: '{{env.ATTOM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: property-sale-rest
    port: 8080
    description: REST adapter for ATTOM Property — Sale.
    resources:
    - path: /v1/sale/detail
      name: sale-detail
      operations:
      - method: GET
        name: getsaledetail
        description: ATTOM Get Sale Detail
        call: property-sale.getsaledetail
        with:
          AttomID: rest.query.AttomID
          address: rest.query.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/saleshistory/detail
      name: saleshistory-detail
      operations:
      - method: GET
        name: getsaleshistorydetail
        description: ATTOM Get Sales History Detail
        call: property-sale.getsaleshistorydetail
        with:
          AttomID: rest.query.AttomID
          address: rest.query.address
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transaction/salestrend
      name: sales-trend
      operations:
      - method: GET
        name: getsalestrend
        description: ATTOM Get Sales Trend
        call: property-sale.getsalestrend
        with:
          geoIdV4: rest.query.geoIdV4
          interval: rest.query.interval
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: property-sale-mcp
    port: 9090
    transport: http
    description: MCP adapter for ATTOM Property — Sale.
    tools:
    - name: attom-get-sale-detail
      description: ATTOM Get Sale Detail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-sale.getsaledetail
      with:
        AttomID: tools.AttomID
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
    - name: attom-get-sales-history-detail
      description: ATTOM Get Sales History Detail
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-sale.getsaleshistorydetail
      with:
        AttomID: tools.AttomID
        address: tools.address
      outputParameters:
      - type: object
        mapping: $.
    - name: attom-get-sales-trend
      description: ATTOM Get Sales Trend
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: property-sale.getsalestrend
      with:
        geoIdV4: tools.geoIdV4
        interval: tools.interval
      outputParameters:
      - type: object
        mapping: $.
