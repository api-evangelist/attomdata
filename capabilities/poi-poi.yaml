naftiko: 1.0.0-alpha2
info:
  label: ATTOM POI API — POI
  description: 'ATTOM Points of Interest — POI search by point or address, and category lookup across 120+
    business categories. Self-contained Naftiko capability covering one ATTOM business surface.'
  tags:
  - ATTOM
  - POI
  - Points Of Interest
  - Neighborhood
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    ATTOM_API_KEY: ATTOM_API_KEY
capability:
  consumes:
  - type: http
    namespace: poi-poi
    baseUri: https://api.gateway.attomdata.com
    description: ATTOM POI — POI business capability.
    resources:
    - name: poi-search
      path: /v4/neighborhood/poi
      operations:
      - name: searchpois
        method: GET
        description: ATTOM Search POIs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: point
          in: query
          type: string
          required: false
        - name: address
          in: query
          type: string
          required: false
        - name: radius
          in: query
          type: number
          required: true
        - name: category
          in: query
          type: string
          required: false
    - name: poi-category-lookup
      path: /v4/neighborhood/poi/categorylookup
      operations:
      - name: lookuppoicategories
        method: GET
        description: ATTOM Lookup POI Categories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: category
          in: query
          type: string
          required: false
        - name: lineofbusiness
          in: query
          type: string
          required: false
        - name: industry
          in: query
          type: string
          required: false
    authentication:
      type: apikey
      key: apikey
      value: '{{env.ATTOM_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: poi-poi-rest
    port: 8080
    description: REST adapter for ATTOM POI.
    resources:
    - path: /v1/neighborhood/poi
      name: poi-search
      operations:
      - method: GET
        name: searchpois
        description: ATTOM Search POIs
        call: poi-poi.searchpois
        with:
          point: rest.query.point
          address: rest.query.address
          radius: rest.query.radius
          category: rest.query.category
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/neighborhood/poi/categorylookup
      name: poi-category-lookup
      operations:
      - method: GET
        name: lookuppoicategories
        description: ATTOM Lookup POI Categories
        call: poi-poi.lookuppoicategories
        with:
          category: rest.query.category
          lineofbusiness: rest.query.lineofbusiness
          industry: rest.query.industry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: poi-poi-mcp
    port: 9090
    transport: http
    description: MCP adapter for ATTOM POI.
    tools:
    - name: attom-search-pois
      description: ATTOM Search POIs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: poi-poi.searchpois
      with:
        point: tools.point
        address: tools.address
        radius: tools.radius
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
    - name: attom-lookup-poi-categories
      description: ATTOM Lookup POI Categories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: poi-poi.lookuppoicategories
      with:
        category: tools.category
        lineofbusiness: tools.lineofbusiness
        industry: tools.industry
      outputParameters:
      - type: object
        mapping: $.
