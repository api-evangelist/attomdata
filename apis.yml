apis:
- aid: attomdata:attom-property-api
  name: ATTOM Property API
  tags:
  - Property
  - Real Estate
  - Assessment
  - AVM
  - Sales
  - Mortgage
  - Owner
  - Building Permits
  - Foreclosure
  humanURL: https://api.developer.attomdata.com/docs
  baseURL: https://api.gateway.attomdata.com/propertyapi/v1.0.0
  properties:
  - url: https://api.developer.attomdata.com/docs
    type: Documentation
  - url: openapi/attom-property-api-openapi.yml
    type: OpenAPI
  - url: https://github.com/AttomDataSolutions/postman-collections
    type: Postman
  - url: json-schema/attom-property-schema.json
    type: JSONSchema
  - url: json-schema/attom-assessment-schema.json
    type: JSONSchema
  - url: json-schema/attom-sale-schema.json
    type: JSONSchema
  - url: json-schema/attom-avm-schema.json
    type: JSONSchema
  - url: json-ld/attomdata-context.jsonld
    type: JSONLD
  - url: capabilities/property-property.yaml
    type: NaftikoCapability
  - url: capabilities/property-assessment.yaml
    type: NaftikoCapability
  - url: capabilities/property-sale.yaml
    type: NaftikoCapability
  - url: capabilities/property-avm.yaml
    type: NaftikoCapability
  - url: capabilities/property-allevents.yaml
    type: NaftikoCapability
  - url: capabilities/property-school.yaml
    type: NaftikoCapability
  - url: capabilities/property-permits.yaml
    type: NaftikoCapability
  - url: examples/attom-property-detail-example.json
    type: Example
  description: Comprehensive property intelligence for 160M+ U.S. properties. Resources cover /property,
    /assessment, /assessmenthistory, /sale, /saleshistory, /salescomparables, /attomavm, /avm, /avmhistory,
    /rentalavm, /homeequity, /allevents, /school, /transportationnoise, /preforeclosure, and /property/buildingpermits,
    each available in `snapshot` and `detail` packages. Returns property characteristics, ownership and
    mortgage records, assessed values and tax history, sales history, AVM valuations (current and historical),
    rental AVM, home equity, school assignments, transportation noise, foreclosure status, and building
    permits. Inputs include AttomID, address, address1/address2, and geographic radius/bounding box.
- aid: attomdata:attom-area-api
  name: ATTOM Area API
  tags:
  - Geography
  - Boundary
  - Parcel
  - GeoID
  - CBSA
  - County
  - State
  humanURL: https://api.developer.attomdata.com/docs
  baseURL: https://api.gateway.attomdata.com/areaapi
  properties:
  - url: https://api.developer.attomdata.com/docs
    type: Documentation
  - url: openapi/attom-area-api-openapi.yml
    type: OpenAPI
  - url: json-schema/attom-area-schema.json
    type: JSONSchema
  - url: capabilities/area-area.yaml
    type: NaftikoCapability
  - url: examples/attom-area-hierarchy-example.json
    type: Example
  description: Area and boundary lookup for state, county, CBSA, neighborhood, school zone, ZIP, and other
    geographic units. Resources include /area/boundary/detail (GeoJSON boundary polygons), /area/hierarchy/lookup
    (geographic hierarchy for a lat/lon), /area/state/lookup, /area/county/lookup, /area/cbsa/lookup,
    /area/geoid/lookup, /area/geoId/legacyLookup, and the v4 /v4/location/lookup that resolves any geoIdV4
    to its location metadata.
- aid: attomdata:attom-poi-api
  name: ATTOM POI API
  tags:
  - Points Of Interest
  - Neighborhood
  - Business
  - Search
  humanURL: https://api.developer.attomdata.com/docs
  baseURL: https://api.gateway.attomdata.com
  properties:
  - url: https://api.developer.attomdata.com/docs
    type: Documentation
  - url: openapi/attom-poi-api-openapi.yml
    type: OpenAPI
  - url: capabilities/poi-poi.yaml
    type: NaftikoCapability
  - url: examples/attom-poi-search-example.json
    type: Example
  description: Points of Interest search and category lookup across 120+ business categories — restaurants,
    banks, shopping, services, and more. Search by point (lat/lon + radius) or address; filter by category,
    line of business, and industry. Returns POIs with names, categories, distances, and addresses.
- aid: attomdata:attom-community-api
  name: ATTOM Community API
  tags:
  - Community
  - Neighborhood
  - Demographics
  - Crime
  - Weather
  - Schools
  - Location
  humanURL: https://api.developer.attomdata.com/docs
  baseURL: https://api.gateway.attomdata.com
  properties:
  - url: https://api.developer.attomdata.com/docs
    type: Documentation
  - url: openapi/attom-community-api-openapi.yml
    type: OpenAPI
  - url: json-schema/attom-community-schema.json
    type: JSONSchema
  - url: capabilities/community-community.yaml
    type: NaftikoCapability
  - url: examples/attom-community-neighborhood-example.json
    type: Example
  description: Neighborhood-level community profile data including demographics, population, household
    income, crime indices, weather, commute, education, and quality-of-life metrics. Resources cover
    /v4.0.0/neighborhood/community (community profile by geoIdV4) and /v4/location/lookup for resolving
    locations by geoIdV4 and geography-type abbreviation (ZI, ND, CO, ST, etc.).
- aid: attomdata:attom-parcel-tiles-api
  name: ATTOM Parcel Tiles API
  tags:
  - Parcel
  - Tiles
  - Mapping
  - GeoJSON
  - Vector Tiles
  humanURL: https://api.developer.attomdata.com/docs
  baseURL: https://api.gateway.attomdata.com
  properties:
  - url: https://api.developer.attomdata.com/docs
    type: Documentation
  - url: openapi/attom-parcel-tiles-api-openapi.yml
    type: OpenAPI
  - url: capabilities/parcel-tiles-tiles.yaml
    type: NaftikoCapability
  description: Vector parcel tile service for rendering ATTOM parcel boundaries on web/mobile maps.
    Tile endpoints return styled parcel geometries suitable for Mapbox, MapLibre, and Leaflet integrations.
    Includes authentication via API key and per-zoom-level tile endpoints.
